services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: chat
      MYSQL_USER: chat
      MYSQL_PASSWORD: chat
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  backend-api:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /app
    command: php -S 0.0.0.0:8080 -t public public/index.php
    env_file:
      - apps/backend/.env
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_started

  backend-worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /app
    command: php bin/worker-search-index.php
    env_file:
      - apps/backend/.env
    depends_on:
      - backend-api

  backend-ws:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    working_dir: /app
    command: php bin/ws-server.php
    env_file:
      - apps/backend/.env
    ports:
      - "9502:9502"
    depends_on:
      - backend-api

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend/Dockerfile
    env_file:
      - apps/frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend-api

volumes:
  mysql_data:
  es_data:
