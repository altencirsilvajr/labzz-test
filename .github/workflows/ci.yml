name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, sodium
          coverage: xdebug
      - run: composer install --no-interaction
      - run: cp .env.example .env
      - run: vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation
      - run: vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation --coverage-text --coverage-clover coverage.xml
        env:
          XDEBUG_MODE: coverage
      - name: Enforce backend coverage >= 80%
        run: |
          php -r 'if(!file_exists("coverage.xml")){fwrite(STDERR,"coverage.xml not generated (check xdebug coverage setup).\n"); exit(1);} $xml=simplexml_load_file("coverage.xml"); $rate=(float)$xml->project[0]["line-rate"]; $pct=$rate*100; echo "Backend unit coverage: ".number_format($pct,2)."%\n"; if($pct<80){fwrite(STDERR,"Coverage below 80%\n"); exit(1);}';

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package.json
      - run: npm install
      - run: npm run build
      - run: npm run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Trivy filesystem scan
        run: trivy fs --scanners vuln,secret,misconfig --exit-code 0 --severity HIGH,CRITICAL .
