name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, sodium
          coverage: none
      - run: composer install --no-interaction
      - run: cp .env.example .env
      - run: vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation
      - run: phpdbg -qrr vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation --coverage-text=coverage.txt --only-summary-for-coverage-text --coverage-clover coverage.xml
      - name: Debug coverage artifacts
        run: |
          ls -lah
          ls -lah coverage.xml coverage.txt || true
          echo "--- coverage.txt ---"
          cat coverage.txt || true
      - name: Enforce backend coverage >= 80%
        run: |
          php -r '$text=file_exists("coverage.txt")?file_get_contents("coverage.txt"):""; if(!preg_match("/Lines:\s+([0-9]+(?:\.[0-9]+)?)%/", $text, $m)){fwrite(STDERR,"Could not parse line coverage from phpunit output.\n"); exit(1);} $pct=(float)$m[1]; echo "Backend unit coverage: ".number_format($pct,2)."%\n"; if($pct<80){fwrite(STDERR,"Coverage below 80%\n"); exit(1);}';

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package.json
      - run: npm install
      - run: npm run build
      - run: npm run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Trivy filesystem scan
        run: trivy fs --scanners vuln,secret,misconfig --exit-code 0 --severity HIGH,CRITICAL .
