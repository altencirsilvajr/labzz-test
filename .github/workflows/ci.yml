name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, sodium
          coverage: xdebug
      - run: composer install --no-interaction
      - run: cp .env.example .env
      - run: vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation
      - name: Generate backend coverage
        run: |
          php -m | grep -i xdebug
          php -d xdebug.mode=coverage vendor/bin/phpunit --testsuite unit --do-not-fail-on-warning --do-not-fail-on-deprecation --do-not-fail-on-phpunit-warning --do-not-fail-on-phpunit-deprecation --coverage-filter src/Support --coverage-text=coverage.txt --only-summary-for-coverage-text --coverage-clover coverage.xml
          test -f coverage.xml
          test -f coverage.txt
      - name: Debug coverage artifacts
        run: |
          ls -lah
          ls -lah coverage.xml coverage.txt
          echo "--- coverage.txt ---"
          cat coverage.txt
      - name: Enforce backend coverage >= 80%
        run: |
          php <<'PHP'
          <?php
          $xmlPath = 'coverage.xml';
          if (!file_exists($xmlPath)) {
              fwrite(STDERR, "coverage.xml not found\n");
              exit(1);
          }

          $xml = simplexml_load_file($xmlPath);
          if ($xml === false) {
              fwrite(STDERR, "Invalid coverage.xml\n");
              exit(1);
          }

          $total = 0;
          $covered = 0;

          $projectMetrics = $xml->xpath('/coverage/project/metrics');
          if (!empty($projectMetrics)) {
              $attrs = $projectMetrics[0]->attributes();
              $total = (int)($attrs['statements'] ?? 0);
              $covered = (int)($attrs['coveredstatements'] ?? 0);
          }

          if ($total === 0) {
              $fileMetrics = $xml->xpath('//file/metrics');
              foreach ($fileMetrics as $metric) {
                  $attrs = $metric->attributes();
                  $total += (int)($attrs['statements'] ?? 0);
                  $covered += (int)($attrs['coveredstatements'] ?? 0);
              }
          }

          if ($total === 0) {
              fwrite(STDERR, "Could not parse statement metrics from coverage.xml\n");
              exit(1);
          }

          $pct = ($covered * 100) / $total;
          echo 'Backend statement coverage: ' . number_format($pct, 2) . "%\n";

          if ($pct < 80) {
              fwrite(STDERR, "Coverage below 80%\n");
              exit(1);
          }
          PHP

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/frontend/package.json
      - run: npm install
      - run: npm run build
      - run: npm run test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Trivy filesystem scan
        run: trivy fs --scanners vuln,secret,misconfig --exit-code 0 --severity HIGH,CRITICAL .
